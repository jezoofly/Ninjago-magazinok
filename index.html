<div id="lightbox" onclick="closeLightbox()">
  <div id="lightbox-wrapper" onclick="event.stopPropagation()">
    <img id="lightbox-img">

    <div id="zoom-controls">
      <button onclick="zoomOut()">-</button>
      <button onclick="resetZoom()">⟲</button>
      <button onclick="zoomIn()">+</button>
    </div>
  </div>
</div>
